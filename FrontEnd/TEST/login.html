<!DOCTYPE html>
<html lang='ar' dir='rtl'>

<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1.0'>
    <title>تسجيل الدخول</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Tahoma
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f1f5f9
        }

        .box {
            background: #fff;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .08);
            width: 380px
        }

        h2 {
            text-align: center;
            margin-bottom: 25px
        }

        .input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 10px
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            background: #2563eb;
            color: #fff;
            border-radius: 10px
        }
    </style>
</head>

<body>
    <div class='box'>
        <h2>تسجيل الدخول</h2>
        <input class='input email'  placeholder='البريد الإلكتروني'>
        <input class='input password' placeholder='كلمة المرور'>
        <button class='btn login'>
            دخول</button>
    </div>

    <script src="main.js"></script>
</body>

</html>
