<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma;
}

body{
    background:#f1f5f9;
}

.container{
    display:grid;
    grid-template-columns:260px 1fr;
    min-height:100vh;
}

/* Sidebar */
.sidebar{
    background:#0f172a;
    color:#fff;
    padding:25px;
}

.sidebar h2{
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    text-decoration:none;
    color:#cbd5e1;
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
}

.sidebar a:hover,
.sidebar a.active{
    background:#1e293b;
    color:#fff;
}

/* Main */
.main{
    padding:30px;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.search{
    background:#fff;
    padding:12px 18px;
    border-radius:10px;
    width:280px;
    border:none;
    outline:none;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:16px;
    box-shadow:0 10px 20px rgba(0,0,0,.05);
}

.card h3{
    margin-bottom:10px;
    color:#64748b;
}

.card p{
    font-size:28px;
    font-weight:bold;
}

/* Tables */
.table-box{
    background:#fff;
    padding:20px;
    border-radius:16px;
    box-shadow:0 10px 20px rgba(0,0,0,.05);
}

.table-box h2{
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:14px;
    text-align:center;
    border-bottom:1px solid #eee;
}

th{
    background:#e2e8f0;
}

.status{
    padding:6px 12px;
    border-radius:8px;
    color:#fff;
    font-size:14px;
}

.pending{
    background:#f59e0b;
}

.active{
    background:#16a34a;
}

.reject{
    background:#dc2626;
}
</style>
</head>

<body>

<div class="container">

<!-- Sidebar -->
<div class="sidebar">
<h2>Admin Panel</h2>

<a href="#" class="active">Dashboard</a>
<a href="students.html">الطلاب</a>
<a href="courses.html">الكورسات</a>
<a href="enrollments.html">الاشتراكات</a>
<a href="quizzes.html">الاختبارات</a>
<a href="payments.html">المدفوعات</a>
<a href="settings.html">الإعدادات</a>

</div>

<!-- Main -->
<div class="main">

<div class="top">
<h1>Dashboard</h1>
<input class="search" placeholder="بحث...">
</div>

<!-- Cards -->
<div class="cards">

<div class="card">
<h3>عدد الطلاب</h3>
<p>1,250</p>
</div>

<div class="card">
<h3>عدد الكورسات</h3>
<p>32</p>
</div>

<div class="card">
<h3>طلبات الاشتراك</h3>
<p>18</p>
</div>

<div class="card">
<h3>الإيرادات</h3>
<p>85,000 EGP</p>
</div>

</div>

<!-- Table -->
<div class="table-box">

<h2>آخر الاشتراكات</h2>

<table>

<tr>
<th>الطالب</th>
<th>الكورس</th>
<th>الحالة</th>
</tr>

<tr>
<td>Ahmed</td>
<td>React</td>
<td><span class="status pending">Pending</span></td>
</tr>

<tr>
<td>Sara</td>
<td>Node.js</td>
<td><span class="status active">Approved</span></td>
</tr>

<tr>
<td>Mohamed</td>
<td>UI/UX</td>
<td><span class="status reject">رفض</span></td>
</tr>

</table>

</div>

</div>
</div>

</body>
</html>
